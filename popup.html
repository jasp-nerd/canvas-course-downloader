<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Course Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 32px; height: 32px; border-radius: 6px; }
    .header h2 { font-size: 15px; font-weight: 700; color: #2d3b45; }
    #status {
      font-size: 13px;
      margin-bottom: 2px;
      color: #555;
    }
    .success { color: #1a7f37; font-weight: 600; }
    .error   { color: #cf222e; }
    .info-section {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      line-height: 1.6;
      display: none;
    }
    .info-section .info-label {
      font-weight: 600;
      color: #2d3b45;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .info-section .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .info-section .info-value { color: #2d3b45; font-weight: 500; }
    .content-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .content-tag {
      background: #e8e8e8;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      color: #555;
      font-weight: 500;
    }
    .content-tag.active { background: #d4edda; color: #1a7f37; }
    .queue-section {
      background: #fff8e6;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 10px;
      font-size: 12px;
      display: none;
    }
    .queue-section .queue-label { font-weight: 600; color: #856404; font-size: 11px; margin-bottom: 4px; }
    .queue-bar-bg { background: #e5e5e5; border-radius: 4px; height: 5px; overflow: hidden; margin-top: 6px; }
    .queue-bar { background: #e82429; height: 100%; border-radius: 4px; transition: width 0.3s; }
    .queue-stats { margin-top: 4px; font-size: 11px; color: #856404; }
    button#downloadBtn {
      width: 100%;
      padding: 10px;
      background-color: #e82429;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.15s;
    }
    button#downloadBtn:hover { background-color: #c51f23; }
    button#downloadBtn:disabled { background-color: #ccc; cursor: not-allowed; }
    .footer {
      margin-top: 12px;
      padding-top: 8px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #999;
      text-align: center;
      line-height: 1.6;
    }
    .footer a { color: #e82429; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon-128.png" alt="">
    <h2>Canvas Course Downloader</h2>
  </div>
  <div id="status">Checking page...</div>

  <div class="info-section" id="courseInfo">
    <div class="info-row">
      <span id="courseName"></span>
    </div>
    <div id="contentTypesRow">
      <div class="info-label" style="margin-top:8px;">Exporting</div>
      <div class="content-tags" id="contentTags"></div>
    </div>
  </div>

  <div class="queue-section" id="queueSection">
    <div class="queue-label">Downloads in progress</div>
    <div id="queueText"></div>
    <div class="queue-bar-bg"><div class="queue-bar" id="queueBar" style="width:0%"></div></div>
    <div class="queue-stats" id="queueStats"></div>
  </div>

  <button id="downloadBtn" disabled>Download Course Content</button>

  <div class="footer">
    <a href="#" id="settingsLink">Settings</a> &middot;
    <a href="https://github.com/jasp-nerd/canvas-course-downloader" target="_blank">⭐ GitHub</a> &middot;
    <a href="https://chromewebstore.google.com/detail/mmnmcnffbkcnhcjiidmdnaclpfeekiol" target="_blank">⭐ Rate</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
